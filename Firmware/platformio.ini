; ============================================================
; DYCE - round electronic dice (ESP32-S3-WROOM-1-N16R8)
; GC9A01 round TFT (SPI) + ring rotary encoder. 100% offline.
; ============================================================

[env:4d_systems_esp32s3_gen4_r8n16]
platform  = espressif32
board     = 4d_systems_esp32s3_gen4_r8n16
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; N16R8 = 16 MB QIO flash + 8 MB OPI PSRAM
board_build.arduino.memory_type = qio_opi
board_upload.flash_size         = 16MB

; --- Build flags ---
; TFT_eSPI reads its pins at COMPILE time, so the display pins live here.
; Display SPI pins: SCL=14 SDA=13 DC=12 CS=11 RST=10 (no MISO, no backlight).
build_flags =
    -Wno-narrowing
    -D BOARD_HAS_PSRAM
    -D USER_SETUP_LOADED=1
    -D GC9A01_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MISO=-1
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=11
    -D TFT_DC=12
    -D TFT_RST=10
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000

lib_deps =
    https://github.com/Bodmer/TFT_eSPI
