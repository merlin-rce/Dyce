<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DYCE — gallery</title>
<link rel="icon" href="assets/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#ffffff; --ink:#16181d; --muted:#8a8f98; --navy:#1e2a44; --line:#ececf0; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink);
        font-family:Montserrat,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  main{ max-width:1080px; margin:0 auto; padding:40px 22px 80px; }
  .top{ display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .back{ color:var(--navy); text-decoration:none; font-weight:700; font-size:14px; opacity:.8; }
  .back:hover{ opacity:1; }
  h1{ font-weight:800; letter-spacing:.04em; margin:26px 0 2px; font-size:34px; }
  .sub{ color:var(--muted); margin:0 0 30px; font-weight:600; letter-spacing:.18em;
        text-transform:uppercase; font-size:12px; }
  h2{ font-weight:700; font-size:16px; letter-spacing:.14em; text-transform:uppercase;
      color:var(--navy); margin:38px 0 16px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:14px; }
  .grid img{ width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:14px;
             background:#f4f4f6; border:1px solid var(--line); cursor:zoom-in;
             transition:transform .18s ease, box-shadow .18s ease; }
  .grid img:hover{ transform:translateY(-3px); box-shadow:0 10px 26px rgba(20,30,60,.14); }
  .gh{ display:inline-flex; align-items:center; gap:8px; margin-top:40px; color:var(--navy);
       text-decoration:none; font-weight:700; font-size:14px; opacity:.85; }
  .gh:hover{ opacity:1; }
  /* lightbox */
  .lb{ position:fixed; inset:0; background:rgba(16,18,24,.92); display:none;
       align-items:center; justify-content:center; padding:28px; cursor:zoom-out; z-index:20; }
  .lb.open{ display:flex; }
  .lb img{ max-width:100%; max-height:100%; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
</style>
</head>
<body>
  <main>
    <div class="top">
      <a class="back" href="index.html">&#8592; Simulator</a>
    </div>
    <h1>DYCE</h1>
    <p class="sub">gallery</p>

    <h2>Renders</h2>
    <div class="grid" id="renders"></div>

    <h2>PCB</h2>
    <div class="grid" id="pcb"></div>

    <a class="gh" href="https://github.com/merlin-rce" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      github.com/merlin-rce
    </a>
  </main>

  <div class="lb" id="lb"><img alt=""></div>

  <script>
    const renders = document.getElementById('renders');
    for (let i = 1; i <= 16; i++) {
      const n = String(i).padStart(2, '0');
      renders.insertAdjacentHTML('beforeend',
        `<img loading="lazy" src="assets/gallery/render-${n}.jpg" alt="DYCE render ${n}">`);
    }
    const pcbFiles = ['pcb-render-up','pcb-render-bottom','pcb-irl-top','pcb-irl-bottom','pcb-irl-global'];
    const pcb = document.getElementById('pcb');
    pcbFiles.forEach(f => pcb.insertAdjacentHTML('beforeend',
      `<img loading="lazy" src="assets/gallery/${f}.jpg" alt="DYCE ${f}">`));

    // lightbox
    const lb = document.getElementById('lb'), lbImg = lb.querySelector('img');
    document.querySelectorAll('.grid img').forEach(img => {
      img.addEventListener('click', () => { lbImg.src = img.src; lb.classList.add('open'); });
    });
    lb.addEventListener('click', () => lb.classList.remove('open'));
  </script>
</body>
</html>
