<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DYCE — simulator</title>
<link rel="icon" href="assets/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <a class="logo" href="index.html"><img src="assets/logo.svg" alt="DYCE"></a>
    <p class="sub">interactive simulator</p>

    <div class="stage">
      <div id="device" class="device encoder">

        <!-- the exact DYCE logo silhouette, drawn crisp in the real navy -->
        <svg class="body" viewBox="0 0 360 360" aria-hidden="true">
          <defs>
            <linearGradient id="bodyG" gradientUnits="userSpaceOnUse" x1="284" y1="110" x2="284" y2="332">
              <stop offset="0"  stop-color="#46568e"/>
              <stop offset=".55" stop-color="#2f3c71"/>
              <stop offset="1"  stop-color="#202b52"/>
            </linearGradient>
            <radialGradient id="wellG" cx=".5" cy=".42" r=".6">
              <stop offset="0" stop-color="#101e3c"/>
              <stop offset="1" stop-color="#0a132a"/>
            </radialGradient>
          </defs>

          <!-- body : the DYCE mark shape (squircle + circle), recolored navy -->
          <g transform="translate(-259.84 -161.97) scale(1.5438)">
            <path d="M288.792 162.246C319.915 162.247 345.145 187.477 345.145 218.6V272.038C345.144 303.161 319.915 328.392 288.792 328.392H234.382C203.259 328.392 178.028 303.161 178.028 272.038V218.6C178.028 187.477 203.259 162.246 234.382 162.246H288.792Z" fill="url(#bodyG)"/>
            <circle cx="284.905" cy="221.515" r="106.877" fill="url(#bodyG)"/>
          </g>
          <ellipse cx="180" cy="74" rx="148" ry="80" fill="#fff" opacity=".06"/>

          <!-- periwinkle encoder ring : spins to show you turn it -->
          <circle class="enc-ring" cx="180" cy="180" r="123" fill="none"
                  stroke="#5c81c1" stroke-width="4.5" stroke-dasharray="2 10.5" stroke-linecap="round"/>

          <!-- screen well + clean periwinkle bezel (from the logo) -->
          <circle cx="180" cy="180" r="115" fill="url(#wellG)"/>
          <circle cx="180" cy="180" r="115" fill="none" stroke="#5c81c1" stroke-width="3.5"/>
          <circle cx="180" cy="180" r="111.5" fill="none" stroke="#000" stroke-width="3" opacity=".4"/>
        </svg>

        <canvas id="screen" width="480" height="480"></canvas>
        <button id="pwr" class="pwr-btn" title="Power" aria-label="Power"></button>
      </div>

      <div id="pwrHint" class="pwr-hint">power <span class="arrow">&#8594;</span></div>
    </div>

    <!-- minimal controls : input-mode switch + help -->
    <div class="controls">
      <button id="modeToggle" class="seg" aria-label="Switch control: turn the ring or scroll the wheel">
        <span class="opt o-ring" title="Turn the ring">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 11a8 8 0 1 1-2.3-5.6"/><path d="M20 4v4h-4"/>
          </svg>
        </span>
        <span class="opt o-mouse" title="Scroll the wheel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="3" width="12" height="18" rx="6"/><path d="M12 7v3.5"/>
          </svg>
        </span>
      </button>

      <button id="info" class="iconbtn" aria-label="How it works">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9.5"/><path d="M9.6 9.2a2.5 2.5 0 1 1 3.4 2.3c-.8.4-1 .9-1 1.7"/>
          <circle cx="12" cy="16.6" r=".5" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </div>
    <p id="modeCaption" class="caption">drag the ring to spin</p>

    <div id="help" class="help hidden">
      <div class="row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 9a8 8 0 1 0 .5 5"/><path d="M19 3.5V9h-5.5"/></svg>
        spin <b>right</b> — charge &amp; roll
      </div>
      <div class="row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9a8 8 0 1 1-.5 5"/><path d="M5 3.5V9h5.5"/></svg>
        spin <b>left</b> — change the odds
      </div>
      <div class="row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.2" fill="currentColor" stroke="none"/></svg>
        pause near <b>&#8532;</b> — a surprise
      </div>
    </div>

    <a class="gh" href="https://github.com/merlin-rce" target="_blank" rel="noopener">merlin-rce</a>
  </main>
  <script src="app.js"></script>
</body>
</html>
